name: Patientor E2E Tests

on:
  push:
    branches: [ xmain, xmaster ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Install patientor backend dependencies
      working-directory: ./patientor/backend
      run: npm install --legacy-peer-deps

    - name: Start patientor backend
      working-directory: ./patientor/backend
      run: npm start &

    - name: Install patientor frontend dependencies
      working-directory: ./patientor/frontend
      run: npm install --legacy-peer-deps

    - name: Build patientor frontend
      working-directory: ./patientor/frontend
      run: npm run build

    - name: Start patientor frontend preview
      working-directory: ./patientor/frontend
      run: npx vite preview --port 5173 &

    - name: Install e2e test dependencies
      working-directory: ./patientor-tests
      run: npm install 

    - name: Install Playwright browsers
      working-directory: ./patientor-tests
      run: npx playwright install --with-deps chromium

    - name: Wait for servers to start
      run: npx wait-on http://localhost:3001/api/ping http://localhost:5173 --timeout 60000

    - name: Run E2E tests
      working-directory: ./patientor-tests
      run: npm test

    - name: Upload test report
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: playwright-report
        path: patientor-tests/playwright-report/
        retention-days: 30
